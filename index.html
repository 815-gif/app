<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis Manhwas Leídos</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>🌸📚 Mis Manhwas Leídos</h1>
        <p>Guarda y organiza tus lecturas con estilo sakura y turquesa.</p>
      </header>

      <nav class="main-nav" aria-label="Navegación principal">
        <button type="button" class="nav-item active" data-tab="home" aria-current="page">
          <span class="nav-icon" aria-hidden="true">🏠</span>
          <span>Home</span>
        </button>
        <button type="button" class="nav-item" data-tab="biblioteca">
          <span class="nav-icon" aria-hidden="true">📚</span>
          <span>Biblioteca</span>
        </button>
        <button type="button" class="nav-item" data-tab="perfil">
          <span class="nav-icon" aria-hidden="true">👤</span>
          <span>Perfil</span>
        </button>
      </nav>

      <section id="home-view" class="view">
        <section class="card">
          <h2>Agregar manhwa</h2>
          <form id="manhwa-form">
            <input id="item-id" type="hidden" />
            <label>
              Título
              <input id="title" type="text" placeholder="Ej. Solo Leveling" required />
            </label>
            <div class="grid-2">
              <label>
                Autor (opcional)
                <input id="author" type="text" placeholder="Ej. Chugong" />
              </label>
              <label>
                Artista (opcional)
                <input id="artist" type="text" placeholder="Ej. Dubu" />
              </label>
            </div>
            <div class="grid-2">
              <label>
                Tipo (opcional)
                <input id="type" type="text" placeholder="Ej. Manhwa / Webtoon" />
              </label>
              <label>
                Demografía (opcional)
                <input id="demography" type="text" placeholder="Ej. Shonen, Seinen" />
              </label>
            </div>
            <div class="grid-2">
              <label>
                Género (opcional)
                <input id="genre" type="text" placeholder="Ej. Acción, Fantasía" />
              </label>
              <label>
                Estado
                <select id="status">
                  <option>Leyendo</option>
                  <option>Publicandose</option>
                  <option>Hiatus</option>
                  <option>Finalizado</option>
                  <option>Pausado</option>
                </select>
              </label>
            </div>
            <div class="grid-2">
              <label>
                Capítulos leídos (opcional)
                <input id="chapters-read" type="number" min="0" placeholder="Ej. 180" />
              </label>
              <label>
                Total de capítulos (opcional)
                <input id="chapters-total" type="number" min="0" placeholder="Ej. 200" />
              </label>
            </div>
            <label>
              URL de portada (opcional)
              <input id="cover-url" type="url" placeholder="https://..." />
            </label>
            <label>
              O subir foto desde tu galería (opcional)
              <input id="cover-file" type="file" accept="image/*" />
            </label>
            <label>
              Valoración (0 a 5)
              <input id="rating" type="number" min="0" max="5" step="0.5" placeholder="Ej. 4.5" />
            </label>
            <label>
              Nota personal (opcional)
              <textarea id="note" rows="3" placeholder="¿Qué te pareció?"></textarea>
            </label>
            <div class="form-actions">
              <button id="submit-btn" type="submit">Guardar</button>
              <button id="cancel-edit" type="button" class="secondary" hidden>Cancelar edición</button>
            </div>
          </form>
        </section>
      </section>

      <section id="biblioteca-view" class="view" hidden>
        <section class="card">
          <div class="list-header">
            <h2>Lista de leídos</h2>
            <button id="clear-all" class="danger" type="button">Borrar todo</button>
          </div>
          <p id="empty-state">Aún no has guardado manhwas.</p>
          <ul id="manhwa-list" class="manhwa-list" aria-live="polite"></ul>
        </section>
      </section>

      <section id="perfil-view" class="view" hidden>
        <section class="card profile-card">
          <div class="profile-head">
            <div class="avatar">👤</div>
            <div>
              <h2 id="profile-name">Mi Perfil Lector</h2>
              <p id="profile-bio">Fan de manhwas con buena historia y arte.</p>
            </div>
          </div>

          <div class="stats-grid" id="profile-stats"></div>

          <div class="profile-extra" id="profile-extra"></div>
        </section>
      </section>

      <dialog id="details-modal">
        <article class="modal-content">
          <h3 id="details-title">Detalle</h3>
          <img id="details-cover" alt="Portada del manhwa" hidden />
          <div id="details-info"></div>
          <p id="details-note"></p>
          <button id="close-details" type="button">Cerrar</button>
        </article>
      </dialog>
    </main>

    <script src="app.js"></script>
  </body>
</html>
